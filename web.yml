- name: "DÉPLOIEMENT COMPLET SERVEUR WEB ASRC — IUC"
  hosts: ec2_server
  become: true
  remote_user: zra-emmanuel

  vars:
    site_dir: /var/www/html
    mysql_root_password: "emmanuel@51"
    mysql_db: "asrc_db"
    mysql_user: "asrc_user"
    mysql_user_password: "emmanuel@51"

  tasks:

  # =========================
  # MISE À JOUR SYSTÈME
  # =========================
  - name: "Mise à jour des paquets apt"
    apt:
      update_cache: yes
      cache_valid_time: 3600

  # =========================
  # INSTALLATION APACHE + PHP
  # =========================
  - name: "Installation Apache2 + PHP"
    apt:
      name:
        - apache2
        - php
        - php-mysql
        - libapache2-mod-php
      state: present

  # =========================
  # INSTALLATION MARIADB (CORRECTION ICI)
  # =========================
  - name: "Installation MariaDB + dépendances"
    apt:
      name:
        - mariadb-server
        - mariadb-client
        - python3-pymysql
      state: present
      update_cache: yes

  # =========================
  # UFW
  # =========================
  - name: "Installation UFW"
    apt:
      name: ufw
      state: present

  # =========================
  # DÉMARRAGE SERVICES
  # =========================
  - name: "Démarrage Apache"
    systemd:
      name: apache2
      state: started
      enabled: true

  - name: "Démarrage MariaDB"
    systemd:
      name: mariadb
      state: started
      enabled: true

  # =========================
  # CONFIGURATION MARIA DB
  # =========================
  - name: "Définir mot de passe root MariaDB"
    shell: |
      mysql -u root -e "
      ALTER USER 'root'@'localhost'
      IDENTIFIED BY '{{ mysql_root_password }}';
      FLUSH PRIVILEGES;"
    ignore_errors: true

  - name: "Créer fichier .my.cnf"
    copy:
      dest: /root/.my.cnf
      content: |
        [client]
        user=root
        password={{ mysql_root_password }}
      mode: '0600'

  - name: "Supprimer utilisateurs anonymes"
    mysql_user:
      name: ''
      host_all: true
      state: absent
      login_user: root
      login_password: "{{ mysql_root_password }}"

  - name: "Créer base de données"
    mysql_db:
      name: "{{ mysql_db }}"
      state: present
      login_user: root
      login_password: "{{ mysql_root_password }}"

  - name: "Créer utilisateur MySQL"
    mysql_user:
      name: "{{ mysql_user }}"
      password: "{{ mysql_user_password }}"
      priv: "{{ mysql_db }}.*:ALL"
      host: localhost
      state: present
      login_user: root
      login_password: "{{ mysql_root_password }}"

  - name: "Créer table etudiants"
    mysql_query:
      login_db: "{{ mysql_db }}"
      login_user: root
      login_password: "{{ mysql_root_password }}"
      query: |
        CREATE TABLE IF NOT EXISTS etudiants (
          id INT AUTO_INCREMENT PRIMARY KEY,
          nom VARCHAR(100) NOT NULL UNIQUE,
          mot_de_passe VARCHAR(255) NOT NULL,
          date_inscription TIMESTAMP DEFAULT CURRENT_TIMESTAMP
        );

  # =========================
  # FIREWALL
  # =========================
  - name: "Autoriser HTTP"
    ufw:
      rule: allow
      port: "80"

  - name: "Autoriser SSH"
    ufw:
      rule: allow
      port: "22"

  - name: "Activer UFW"
    ufw:
      state: enabled

  # =========================
  # DEPLOIEMENT APP
  # =========================
  - name: "Supprimer page Apache"
    file:
      path: "{{ site_dir }}/index.html"
      state: absent

  - name: "Copier application PHP"
    copy:
      src: index.php
      dest: "{{ site_dir }}/index.php"
      owner: www-data
      group: www-data
      mode: '0644'

  - name: "Configurer index.php par défaut"
    lineinfile:
      path: /etc/apache2/mods-enabled/dir.conf
      regexp: 'DirectoryIndex'
      line: 'DirectoryIndex index.php index.html'

  # =========================
  # RESTART SERVICES
  # =========================
  - name: "Restart Apache"
    systemd:
      name: apache2
      state: restarted

  - name: "Restart MariaDB"
    systemd:
      name: mariadb
      state: restarted